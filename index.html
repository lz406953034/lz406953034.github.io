<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
    <div class="logo">我的网站</div>
    <ul class="menu">
        <li><a href="#home" class="nav-link">首页</a></li>
        <li><a href="#about" class="nav-link">关于我</a></li>
        <li><a href="#photo" class="nav-link">我的照片</a></li>
        <li><a href="#contact" class="nav-link">联系我</a></li>
    </ul>
</nav>

<!-- 首页区域 -->
<section id="home" class="hero fade-in">
    <div class="hero-text">
        <h1>欢迎来到我的网站</h1>
        <p>这是我亲手搭建的第一个漂亮网站</p>
        <button class="btn">了解更多</button>
    </div>
</section>

<!-- 关于我 -->
<section id="about" class="about fade-in">
    <h2>关于我</h2>
    <p>我正在学习网页制作，这个网站是我的作品。<br>
    我会继续学习，做出更厉害的网站！</p>
</section>

<!-- 图片区域 -->
<section id="photo" class="photo fade-in">
    <h2>我的照片</h2>
    <div class="photo-grid">
        <img src="https://picsum.photos/400/300?random=1" alt="图片1">
        <img src="https://picsum.photos/400/300?random=2" alt="图片2">
        <img src="https://picsum.photos/400/300?random=3" alt="图片3">
    </div>
</section>

<!-- 联系我 -->
<section id="contact" class="contact fade-in">
    <h2>联系我</h2>
    <p>邮箱：xxx@example.com</p>
    <p>欢迎交流学习！</p>
</section>

<script src="script.js"></script>
</body>
</html>
